version: '3.8'

services:
  db:
    image: postgres:16
    container_name: erp_postgres_db
    environment:
      POSTGRES_DB: shoe_trading_erp
      POSTGRES_USER: linjerry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linjerry -d shoe_trading_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
